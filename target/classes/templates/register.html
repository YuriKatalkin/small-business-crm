<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 20px 0;">

<div class="card shadow-sm" style="width: 100%; max-width: 450px;">
    <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">Регистрация менеджера</h3>

        <!-- Ошибка, если юзер/email уже заняты (глобальная ошибка из контроллера) -->
        <div th:if="${error}" class="alert alert-danger p-2 small text-center" role="alert" th:text="${error}"></div>

        <form th:action="@{/auth/register}" th:object="${userDto}" method="post">

            <div class="mb-3">
                <label for="username" class="form-label small fw-bold">Логин (минимум 3 символа)</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" placeholder="ivanov123">
                <div class="invalid-feedback small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label small fw-bold">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="example@mail.com">
                <div class="invalid-feedback small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="firstName" class="form-label small fw-bold">Имя</label>
                <input type="text" id="firstName" th:field="*{firstName}" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" placeholder="Иван">
                <div class="invalid-feedback small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
            </div>

            <div class="mb-3">
                <label for="lastName" class="form-label small fw-bold">Фамилия</label>
                <input type="text" id="lastName" th:field="*{lastName}" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" placeholder="Иванов">
                <div class="invalid-feedback small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Пароль (минимум 6 символа)</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="******">
                <div class="invalid-feedback small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-3">Зарегистрироваться</button>
        </form>

        <div class="text-center small">
            Уже есть аккаунт? <a th:href="@{/auth/login}" class="text-decoration-none">Войти</a>
        </div>
    </div>
</div>

</body>
</html>
