<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/layout :: header('Дашборд')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <h6 class="text-muted small text-uppercase fw-bold">Контакты</h6>
                <h3 th:text="${contactCount}" class="mb-0 fw-bold">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <h6 class="text-muted small text-uppercase fw-bold">В работе</h6>
                <h3 th:text="${pipelineAmount} + ' ₽'" class="mb-0 fw-bold text-primary">0 ₽</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <h6 class="text-muted small text-uppercase fw-bold">Задач выполнено</h6>
                <h3 th:text="${completedTasks}" class="mb-0 fw-bold text-success">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <h6 class="text-muted small text-uppercase fw-bold">Закрыто</h6>
                <h3 th:text="${wonAmount} + ' ₽'" class="mb-0 fw-bold text-dark">0 ₽</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white fw-bold py-3">Последние контакты</div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(recentContacts)}" class="p-4 text-center text-muted">
                        Контакты пока не созданы
                    </div>
                    <table th:if="${!#lists.isEmpty(recentContacts)}" class="table table-hover align-middle mb-0">
                        <tbody>
                        <tr th:each="c : ${recentContacts}">
                            <td class="ps-3 fw-semibold text-dark" th:text="${c.firstName + ' ' + c.lastName}">Имя</td>
                            <td class="text-muted" th:text="${c.email}">Email</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white fw-bold py-3 d-flex justify-content-between align-items-center">
                    <span class="mb-0">Ближайшие задачи</span>
                    <a href="/tasks/new" class="btn btn-sm btn-primary py-1 px-2 fw-semibold">+ Добавить</a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(upcomingTasks)}" class="p-4 text-center text-muted">
                        У вас нет активных задач 👍
                    </div>

                    <ul th:if="${!#lists.isEmpty(upcomingTasks)}" class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3" th:each="t : ${upcomingTasks}">
                            <div>
                                <a th:href="@{/tasks/{id}/edit(id=${t.id})}"
                                   class="fw-semibold text-dark text-decoration-none text-primary-hover"
                                   th:text="${t.title}">Задача</a>
                                <div th:if="${t.description}" class="small text-muted" th:text="${t.description}">Описание</div>
                            </div>
                            <span class="badge bg-light text-danger border px-2 py-1 small"
                                  th:text="${t.dueDate != null} ? ${#temporals.format(t.dueDate, 'dd.MM.yyyy')} : 'Без даты'">
                                Дата
                            </span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .text-primary-hover:hover {
        color: #0d6efd !important;
        text-decoration: underline !important;
    }
</style>

</body>
</html>
