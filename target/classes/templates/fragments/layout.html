<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <div class="d-flex align-items-center">
            <a class="navbar-brand fw-bold" href="/dashboard">Моя CRM</a>
            <div class="navbar-nav d-flex flex-row gap-3 ms-2">
                <a class="nav-link" href="/deals">Сделки</a>
                <a class="nav-link" href="/contacts">Контакты</a>
            </div>
        </div>

        <div class="navbar-nav">
            <form th:action="@{/auth/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-link nav-link border-0 align-baseline" style="text-decoration: none; cursor: pointer;">
                    Выйти
                </button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
