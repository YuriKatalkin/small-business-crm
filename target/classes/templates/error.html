<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка приложения</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; text-align: center; padding-top: 100px; }
        .error-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #d9534f; }
        a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<div class="error-container">
    <h1>Упс! Что-то пошло не так</h1>
    <p th:text="${errorMessage}">Техническая информация</p>
    <a href="/">Вернуться на главную</a>
</div>
</body>
</html>
