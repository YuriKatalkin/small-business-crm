spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm_db}
    username: ${DB_USER:crm_user}
    password: ${DB_PASSWORD:crm_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    root: WARN
    com.smallbusiness: INFO
  file:
    name: logs/crm-system.log
    max-size: 10MB
    max-history: 30
