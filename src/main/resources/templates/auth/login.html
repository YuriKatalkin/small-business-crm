<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">Вход в систему</h3>

        <!-- Сообщение об ошибке авторизации -->
        <div th:if="${param.error}" class="alert alert-danger p-2 small text-center" role="alert">
            Неверный логин или пароль
        </div>

        <!-- Сообщение об успешном выходе из системы -->
        <div th:if="${param.logout}" class="alert alert-info p-2 small text-center" role="alert">
            Вы успешно вышли из системы
        </div>

        <!-- Сообщение об успешной регистрации -->
        <div th:if="${param.success}" class="alert alert-success p-2 small text-center" role="alert">
            Регистрация прошла успешно! Войдите.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold">Логин</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Введите логин" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
        </form>

        <div class="text-center small">
            Еще не зарегистрированы? <a th:href="@{/auth/register}" class="text-decoration-none">Создать аккаунт</a>
        </div>
    </div>
</div>

</body>
</html>
