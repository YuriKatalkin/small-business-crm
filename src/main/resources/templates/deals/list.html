<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/layout :: header('Сделки')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Все сделки</h2>
        <a href="/deals/new" class="btn btn-primary">Добавить сделку</a>
    </div>
    <table class="table table-striped">
        <thead>
        <tr><th>Название</th><th>Сумма</th><th>Этап</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="d : ${deals}">
            <td th:text="${d.name}"></td>
            <td th:text="${d.amount}"></td>
            <td th:text="${d.stage}"></td>
            <td>
                <a th:href="@{'/deals/' + ${d.id} + '/edit'}" class="btn btn-sm btn-warning">Edit</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
