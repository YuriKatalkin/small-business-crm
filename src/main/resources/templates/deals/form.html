<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/layout :: header(${deal.id == null ? 'Новая сделка' : 'Редактирование сделки'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0" th:text="${deal.id == null ? 'Создание сделки' : 'Редактирование сделки'}">Сделка</h4>
                </div>
                <div class="card-body">
                    <form th:action="${deal.id == null ? '/deals' : '/deals/' + deal.id}" th:object="${deal}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label th:id="dealNameLabel" for="dealName" class="form-label fw-bold">Название сделки</label>
                            <input type="text" id="dealName" th:field="*{name}" class="form-control" required placeholder="Например: Продажа ПО">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label th:id="contactIdLabel" for="contactId" class="form-label fw-bold">Контакт</label>
                                <div class="input-group">
                                    <select id="contactId" name="contactId" class="form-select" required>
                                        <option value="" disabled selected>Выберите контакт</option>
                                        <option th:each="c : ${contacts}"
                                                th:value="${c.id}"
                                                th:text="${c.firstName + ' ' + c.lastName}"
                                                th:selected="${deal.contact != null && deal.contact.id == c.id}">
                                        </option>
                                    </select>
                                    <a th:href="@{/contacts/new(redirect=${deal.id == null ? '/deals/new' : '/deals/' + deal.id + '/edit'})}"
                                       class="btn btn-outline-primary" title="Создать новый контакт">+</a>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label th:id="companySelectLabel" for="companySelect" class="form-label fw-bold">Компания</label>
                                <select id="companySelect" name="companyId" class="form-select">
                                    <option value="">Не выбрана</option>
                                    <option th:each="comp : ${companies}"
                                            th:value="${comp.id}"
                                            th:text="${comp.name}"
                                            th:selected="${deal.company != null && deal.company.id == comp.id}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label th:id="amountLabel" class="form-label fw-bold">Сумма (₽)</label>
                                <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label th:id="stageLabel" class="form-label fw-bold">Этап</label>
                                <select th:field="*{stage}" class="form-select">
                                    <option th:each="s : ${stages}" th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label th:id="statusLabel" class="form-label fw-bold">Статус</label>
                                <select th:field="*{status}" class="form-select">
                                    <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label th:id="descriptionLabel" class="form-label fw-bold">Описание</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="/deals" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
