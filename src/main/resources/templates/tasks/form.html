<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/layout :: header('Задача')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold" th:text="${task.id == null ? 'Создать новую задачу' : 'Редактирование задачи'}">Задача</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/tasks}" th:object="${task}" method="post" id="taskForm">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="title" class="form-label fw-bold">Название задачи</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" required placeholder="Например: Позвонить клиенту">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Описание</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Детали задачи..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="dueDate" class="form-label fw-bold">Срок выполнения</label>
                                <input type="date" id="dueDate" th:field="*{dueDate}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3" th:if="${task.id != null}">
                                <label for="status" class="form-label fw-bold">Статус</label>
                                <select id="status" th:field="*{status}" class="form-select">
                                    <option value="NOT_STARTED">NOT_STARTED</option>
                                    <option value="IN_PROGRESS">IN_PROGRESS</option>
                                    <option value="COMPLETED">COMPLETED</option>
                                    <option value="CANCELLED">CANCELLED</option>
                                </select>
                            </div>

                            <input type="hidden" th:if="${task.id == null}" th:field="*{status}" />
                        </div>

                        <input type="hidden" th:field="*{type}" />
                        <input type="hidden" th:field="*{priority}" />

                        <div class="d-flex justify-content-between mt-4">
                            <div>
                                <button type="submit"
                                        th:if="${task.id != null}"
                                        th:formaction="@{/tasks/{id}/delete(id=${task.id})}"
                                        formnovalidate
                                        class="btn btn-outline-danger"
                                        onclick="return confirm('Вы уверены, что хотите удалить эту задачу?');">
                                    Удалить задачу
                                </button>
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/dashboard" class="btn btn-secondary">Отмена</a>
                                <button type="submit" class="btn btn-primary" th:text="${task.id == null ? 'Создать задачу' : 'Сохранить изменения'}">Сохранить</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
